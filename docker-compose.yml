version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: courtvision-db
    environment:
      POSTGRES_USER: ${DB_USER:-courtvision}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-courtvision_dev_password}
      POSTGRES_DB: ${DB_NAME:-courtvision_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-courtvision}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - courtvision-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: courtvision-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-courtvision}:${DB_PASSWORD:-courtvision_dev_password}@postgres:5432/${DB_NAME:-courtvision_ai}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - courtvision-network
    restart: unless-stopped

  # Frontend Web App
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: courtvision-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - courtvision-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  courtvision-network:
    driver: bridge
