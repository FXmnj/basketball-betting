version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: courtvision-db
    environment:
      POSTGRES_USER: courtvision
      POSTGRES_PASSWORD: courtvision_dev_password
      POSTGRES_DB: courtvision_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtvision"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - courtvision-network

  backend:
    image: ghcr.io/Forexbase/basketball-betting-backend:main
    container_name: courtvision-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://courtvision:courtvision_dev_password@postgres:5432/courtvision_ai
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "5000:5000"
    networks:
      - courtvision-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/Forexbase/basketball-betting-frontend:main
    container_name: courtvision-frontend
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - courtvision-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  courtvision-network:
    driver: bridge
